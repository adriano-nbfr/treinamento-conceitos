<img class="app-logo"
  [src]="`img/logo-angular-${logoGradiente ? 'gradiente' : 'branco'}.png`"
  [attr.title]="titulo()"
  (click)="logoClick($event)" />

<h1 [class.w-100]="tituloCentralizado" [class]="{'text-center': tituloCentralizado}"
  [style.opacity]="opacidade">
  {{titulo()}}
</h1>

<span class="ms-auto">{{hoje | date : 'dd/MM/yyyy HH:mm'}}</span>
